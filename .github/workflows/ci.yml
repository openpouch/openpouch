name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck (gate 1)
        run: npx tsc --noEmit -p tsconfig.json
      - name: Unit tests (gate 2 — live E2Es auto-skip without RENDER_API_KEY)
        run: npx vitest run
      - name: Build (gate 3 — compiled dist/, project references)
        run: npm run build
      - name: Built-artifact smoke — CLI classified error from dist
        working-directory: ${{ runner.temp }}
        run: |
          set +e
          out=$(node "$GITHUB_WORKSPACE/packages/cli/bin/openpouch.js" inspect --json)
          code=$?
          set -e
          test "$code" -eq 3
          echo "$out" | grep -q '"category": "env"'
      - name: Built-artifact smoke — MCP stdio handshake from dist
        run: |
          (printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"0.0.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}'; sleep 2) \
            | node packages/mcp/bin/openpouch-mcp.js \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c).on("end",()=>{const lines=d.trim().split("\n").filter(Boolean).map(l=>JSON.parse(l));const tools=lines.find(m=>m.id===2).result.tools.map(t=>t.name);if(tools.length!==13)throw new Error("expected 13 tools, got "+tools.length);if(tools.includes("openpouch_approve"))throw new Error("approve tool must not exist");console.log("mcp dist smoke ok: "+tools.length+" tools, no approve tool")})'
